<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <label>Enter a number: </label>
    <input type="text" id="num1" /><span id="text1" hidden
      >you not entered number</span
    ><br />
    <button onclick="checksum()">check the number</button>
    <div id="output"></div>
    <script>
      function checksum() {
        document.getElementById("text1").hidden = true;
        let num = document.getElementById("num1").value;
        console.log(num);
        if (num !== "") {
            num=Number(num);
            if(num===0){
                document.getElementById('output').innerHTML="<p>zero</p>";
            }
            else if(num<0){
                document.getElementById('output').innerHTML="<p>negative</p>";
            }
            else{
                document.getElementById('output').innerHTML="<p>postive</p>";
            }
        } else {
            document.getElementById('text1').hidden=false;
        }
    }
    </script>
  </body>
</html>
