<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <label>Enter a number: </label>
    <input type="text" id="num1" /><span id="text1" hidden
      >you not entered number</span
    ><br />
    <button onclick="checksum()">check the number</button>
    <div id="output"></div>
    <script>
      function checksum() {
        document.getElementById("text1").hidden = true;
        let num = document.getElementById("num1").value;
        console.log(num);
        if (num !== "") {
          num = Number(num);
          switch (num) {
            case 1:
                document.getElementById('output').innerHTML="<p>Monday</p>";
              break;
            case 2:
                document.getElementById('output').innerHTML="<p>Tuesday</p>";
              break;
            case 3:
                document.getElementById('output').innerHTML="<p>Wednesday</p>";
              break;
            case 4:
                document.getElementById('output').innerHTML="<p>Thursday</p>";
              break;
            case 5:
                document.getElementById('output').innerHTML="<p>Friday</p>";
              break;
            case 6:
                document.getElementById('output').innerHTML="<p>Saturday</p>";
              break;
            case 7:
                document.getElementById('output').innerHTML="<p>Sunday</p>";
              break;
            default:
                document.getElementById('output').innerHTML="<p>Invalid day</p>";

          }
        }
        else {
            document.getElementById('text1').hidden=false;
        }
      }
    </script>
  </body>
</html>
