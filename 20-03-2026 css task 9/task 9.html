<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1{
            text-align: center;
            text-transform: uppercase;
            text-shadow: 3px 3px 5px;
            color:blueviolet

        }
        hr{
            height: 5px;
            background-color: black;
        }
        body{
            background: linear-gradient(135deg, #ffd6e0, #ffe5b4, #e0c3fc, #c2e9fb);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .box{
            padding: 20px;
            margin:20px;
            border:2px solid black;
            width: 400px;
            height:200px;
            background-color: lightcoral;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 6px solid blue;
            box-shadow: 3px 3px 5px;
            font-family: 'Courier New', Courier, monospace;
            color: black;
        }
        p{
            color:blueviolet;
            font-weight:bolder;
            text-decoration:overline;

        }
    </style>
</head>
<body>
    <!-- <h1>CSS TASK</h1>
    <hr> -->

    <div class="box">
        <p>this is a box</p>
    </div>
</body>
</html>
