<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            height: 100vh;
            align-items: center;
            flex-direction: column;
            background: linear-gradient(90deg, #00C9FF 0%, #92FE9D 100%);
        }
        h1{
            text-align: center;
            color: blueviolet;
        }
        button{
            width:30%;
            height: 5%;
            color: aquamarine;
            background-color: blueviolet;
            border-radius: 50px;
        }
    </style>
</head>
<body>
    <h1>Button event</h1>
    <button onclick="click1()">click me</button>
    <script>
        function click1(){
            alert("button click event");
        }
    </script>
</body>
</html>
