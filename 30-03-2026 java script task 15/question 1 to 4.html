<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>java script</title>
</head>
<body>
    <h1 id="h1"></h1>
    <script>
        console.log("hello js");
        document.getElementById('h1').innerHTML="Hello js";
        //question 1 in single comment
    </script>
    <h1 id="name"></h1>
    <h1 id="age"></h1>
    <script>
        /*this is question 2
        name and age using console multi line comment*/
        let name="venkat";
        let age=22;
        console.log(name);
        console.log(age);
        document.getElementById('name').innerHTML=name;
        document.getElementById('age').innerHTML=age;
    </script>
</body>
</html>
